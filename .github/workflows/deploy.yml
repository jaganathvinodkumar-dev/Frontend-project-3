name: Build and Deploy

on:
  push:
    branches: [ main, master ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: Diagnostics
        run: |
          node -v
          npm -v
          pwd
          ls -la
          npm list --depth=0 || true
      - name: Build
        run: bash -lc "npm run build 2>&1 | tee build-output.log; exit ${PIPESTATUS[0]}"
      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log
      - name: Deploy to gh-pages branch
        env:
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # prepare a temporary worktree
          git fetch origin
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
            git rm -rf .
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi
          cp -r ./dist/. ./
          git add -A
          git commit -m "Deploy to gh-pages: $GITHUB_SHA" || echo "No changes to commit"
          git push --force https://x-access-token:${TOKEN}@github.com/${REPO}.git gh-pages
